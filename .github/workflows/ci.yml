name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Smoke-test the demo
        run: python scripts/recommend_demo.py -q "rainy day study session" -k 5

      - name: Smoke-test the evaluation
        run: python scripts/evaluate.py
