<svg viewBox="0 0 1060 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#5a6258"/>
    </marker>
    <marker id="arwd" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto">
      <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#b9986f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1060" height="560" fill="#f3efe3" rx="10"/>

  <!-- title -->
  <text x="530" y="40" text-anchor="middle" font-size="23" font-weight="700" fill="#38433a">Mood-Based Music Playlist — System Architecture</text>
  <text x="530" y="64" text-anchor="middle" font-size="12.5" fill="#8a7a63">Both branches map into one 15-mood space:  Happy · Sad · Energized · … · Lonely</text>

  <!-- lane labels -->
  <text x="30" y="104" font-size="11" font-weight="700" letter-spacing="1.5" fill="#b9986f">USER BRANCH</text>
  <text x="30" y="330" font-size="11" font-weight="700" letter-spacing="1.5" fill="#b9986f">SONG LIBRARY BRANCH</text>

  <!-- ================= USER BRANCH ================= -->
  <!-- A1 user text (input) -->
  <rect x="30" y="116" width="170" height="62" rx="12" fill="#38433a"/>
  <text x="115" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#f3efe3">User text</text>
  <text x="115" y="161" text-anchor="middle" font-size="11" fill="#cdd4c8" font-style="italic">"…rejected by a girl"</text>

  <!-- A2 BERT (model) -->
  <rect x="250" y="116" width="150" height="62" rx="12" fill="#d4b896"/>
  <text x="325" y="139" text-anchor="middle" font-size="9.5" font-weight="700" letter-spacing="1" fill="#8a6f4c">TASK 1</text>
  <text x="325" y="160" text-anchor="middle" font-size="16" font-weight="700" fill="#2c352e">BERT</text>

  <!-- A3 mood vector (data) -->
  <rect x="450" y="116" width="160" height="62" rx="12" fill="#faf7ee" stroke="#38433a" stroke-width="1.5"/>
  <text x="530" y="141" text-anchor="middle" font-size="14" font-weight="700" fill="#2c352e">Mood vector</text>
  <text x="530" y="160" text-anchor="middle" font-size="11" fill="#5a6258">15-dim probability</text>

  <!-- user arrows -->
  <line x1="200" y1="147" x2="248" y2="147" stroke="#5a6258" stroke-width="2.2" marker-end="url(#arw)"/>
  <line x1="400" y1="147" x2="448" y2="147" stroke="#5a6258" stroke-width="2.2" marker-end="url(#arw)"/>
  <!-- A3 -> similarity -->
  <path d="M610,160 C 690,185 700,205 720,238" fill="none" stroke="#5a6258" stroke-width="2.2" marker-end="url(#arw)"/>

  <!-- ================= SIMILARITY + OUTPUT ================= -->
  <rect x="660" y="242" width="150" height="74" rx="14" fill="#c2603f"/>
  <text x="735" y="276" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Cosine</text>
  <text x="735" y="296" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">similarity</text>

  <rect x="868" y="234" width="166" height="90" rx="14" fill="#2c352e" stroke="#d4b896" stroke-width="1.5"/>
  <text x="951" y="270" text-anchor="middle" font-size="15" font-weight="700" fill="#f3efe3">Top-K playlist</text>
  <text x="951" y="297" text-anchor="middle" font-size="18" fill="#d4b896">♪ ♪ ♪ ♪</text>

  <line x1="810" y1="279" x2="866" y2="279" stroke="#5a6258" stroke-width="2.4" marker-end="url(#arw)"/>

  <!-- ================= SONG BRANCH ================= -->
  <!-- inputs -->
  <rect x="20" y="350" width="160" height="54" rx="12" fill="#38433a"/>
  <text x="100" y="382" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f3efe3">Song audio (.wav)</text>

  <rect x="20" y="430" width="160" height="54" rx="12" fill="#38433a"/>
  <text x="100" y="462" text-anchor="middle" font-size="13.5" font-weight="700" fill="#f3efe3">Song description</text>

  <!-- models -->
  <rect x="222" y="350" width="168" height="54" rx="12" fill="#d4b896"/>
  <text x="306" y="370" text-anchor="middle" font-size="9.5" font-weight="700" letter-spacing="1" fill="#8a6f4c">TASK 3</text>
  <text x="306" y="390" text-anchor="middle" font-size="14.5" font-weight="700" fill="#2c352e">JukeMIR · Jukebox</text>

  <rect x="222" y="430" width="168" height="54" rx="12" fill="#d4b896"/>
  <text x="306" y="450" text-anchor="middle" font-size="9.5" font-weight="700" letter-spacing="1" fill="#8a6f4c">TASK 2</text>
  <text x="306" y="470" text-anchor="middle" font-size="15" font-weight="700" fill="#2c352e">Gemini</text>

  <!-- probe + db -->
  <rect x="432" y="390" width="150" height="54" rx="12" fill="#faf7ee" stroke="#38433a" stroke-width="1.5"/>
  <text x="507" y="414" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2c352e">Audio mood</text>
  <text x="507" y="431" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2c352e">probe</text>

  <rect x="624" y="390" width="140" height="54" rx="12" fill="#faf7ee" stroke="#38433a" stroke-width="1.5"/>
  <text x="694" y="414" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2c352e">Song mood</text>
  <text x="694" y="431" text-anchor="middle" font-size="13.5" font-weight="700" fill="#2c352e">database</text>

  <!-- song arrows -->
  <line x1="180" y1="377" x2="220" y2="377" stroke="#5a6258" stroke-width="2.2" marker-end="url(#arw)"/>
  <line x1="180" y1="457" x2="220" y2="457" stroke="#5a6258" stroke-width="2.2" marker-end="url(#arw)"/>

  <!-- JukeMIR -> probe : representation (solid) -->
  <path d="M390,377 C 412,377 416,405 430,412" fill="none" stroke="#5a6258" stroke-width="2.2" marker-end="url(#arw)"/>
  <text x="408" y="372" text-anchor="middle" font-size="9.5" fill="#5a6258">[4 × 4800]</text>

  <!-- Gemini labels -> probe : supervision (dashed) -->
  <path d="M390,457 C 412,457 416,430 430,423" fill="none" stroke="#b9986f" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arwd)"/>
  <text x="412" y="478" text-anchor="middle" font-size="9.5" fill="#b9986f">labels (supervise)</text>

  <line x1="582" y1="417" x2="622" y2="417" stroke="#5a6258" stroke-width="2.2" marker-end="url(#arw)"/>

  <!-- song mood DB -> similarity -->
  <path d="M735,390 C 735,360 735,345 735,318" fill="none" stroke="#5a6258" stroke-width="2.2" marker-end="url(#arw)"/>

  <!-- legend -->
  <g font-size="11" fill="#5a6258">
    <rect x="30" y="522" width="16" height="11" rx="3" fill="#38433a"/><text x="52" y="531">input</text>
    <rect x="110" y="522" width="16" height="11" rx="3" fill="#d4b896"/><text x="132" y="531">model</text>
    <rect x="195" y="522" width="16" height="11" rx="3" fill="#faf7ee" stroke="#38433a"/><text x="217" y="531">data</text>
    <rect x="270" y="522" width="16" height="11" rx="3" fill="#c2603f"/><text x="292" y="531">match</text>
    <line x1="360" y1="528" x2="390" y2="528" stroke="#b9986f" stroke-width="2" stroke-dasharray="5 4"/><text x="396" y="531">supervision</text>
  </g>
</svg>
